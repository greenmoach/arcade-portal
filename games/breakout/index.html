<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Breakout — Game Portal</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f5f5f7;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh}
nav{width:100%;background:#fff;border-bottom:1px solid #e5e7eb;padding:0 24px;height:50px;display:flex;align-items:center}
nav a{color:#6c63ff;text-decoration:none;font-size:14px;font-weight:500}
nav a:hover{text-decoration:underline}
h1{margin:20px 0 4px;font-size:24px;font-weight:700}
.sub{color:#6b7280;font-size:14px;margin-bottom:16px}
.score-bar{display:flex;gap:16px;margin-bottom:12px}
.score-box{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:8px 18px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.score-label{font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:.05em}
.score-val{font-size:20px;font-weight:700;color:#6c63ff}
.canvas-wrap{position:relative}
canvas{background:#fff;border-radius:14px;border:1px solid #e5e7eb;box-shadow:0 4px 12px rgba(0,0,0,.08);display:block;cursor:none}
.overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(245,245,247,.92);border-radius:14px;gap:10px}
.overlay h2{font-size:26px;font-weight:700}
.overlay p{color:#6b7280;font-size:14px;text-align:center;padding:0 20px}
.btn{padding:9px 22px;background:#6c63ff;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:background .15s}
.btn:hover{background:#574fd6}
.hint{margin-top:10px;font-size:12px;color:#9ca3af}
</style>
</head>
<body>
<nav><a href="../../">← Back to Portal</a></nav>
<h1>🧱 Breakout</h1>
<p class="sub">Bounce the ball to break all bricks. Don't let it fall!</p>

<div class="score-bar">
  <div class="score-box"><div class="score-label">Score</div><div class="score-val" id="score">0</div></div>
  <div class="score-box"><div class="score-label">Lives</div><div class="score-val" id="lives">3</div></div>
  <div class="score-box"><div class="score-label">Level</div><div class="score-val" id="level">1</div></div>
</div>

<div class="canvas-wrap">
  <canvas id="c" width="480" height="520"></canvas>
  <div class="overlay" id="overlay">
    <h2>🧱 Breakout</h2>
    <p>Move mouse or finger to control the paddle.<br>Break all bricks to advance!</p>
    <button class="btn" onclick="startGame()">Start Game</button>
  </div>
</div>
<p class="hint">Mouse / Touch to move paddle · Click to launch ball</p>

<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const W=480,H=520;

// Colors for brick rows
const ROW_COLORS=['#ef4444','#f97316','#f59e0b','#84cc16','#22d3ee','#6c63ff'];

let paddle,ball,bricks,score,lives,level,running,animId;

function initLevel(){
  const rows=4+Math.min(level-1,4);
  const cols=10;
  const bw=(W-40)/cols-4;
  bricks=[];
  for(let r=0;r<rows;r++)
    for(let c=0;c<cols;c++)
      bricks.push({x:22+c*(bw+4),y:60+r*26,w:bw,h:20,alive:true,color:ROW_COLORS[r%ROW_COLORS.length],hp:r<2?1:1});
}

function startGame(){
  score=0;lives=3;level=1;
  document.getElementById('score').textContent=0;
  document.getElementById('lives').textContent=3;
  document.getElementById('level').textContent=1;
  document.getElementById('overlay').style.display='none';
  resetBall();
  initLevel();
  running=true;
  cancelAnimationFrame(animId);
  loop();
}

function resetBall(){
  paddle={x:W/2-40,y:H-30,w:80,h:12,speed:0};
  ball={x:W/2,y:H-50,vx:3.5*(Math.random()>.5?1:-1),vy:-4,r:8,launched:false};
}

function loop(){
  update();draw();
  if(running)animId=requestAnimationFrame(loop);
}

function update(){
  if(!ball.launched){ball.x=paddle.x+paddle.w/2;return;}
  ball.x+=ball.vx;ball.y+=ball.vy;
  // walls
  if(ball.x-ball.r<0){ball.x=ball.r;ball.vx*=-1;}
  if(ball.x+ball.r>W){ball.x=W-ball.r;ball.vx*=-1;}
  if(ball.y-ball.r<0){ball.y=ball.r;ball.vy*=-1;}
  // bottom
  if(ball.y+ball.r>H){
    lives--;document.getElementById('lives').textContent=lives;
    if(lives<=0){endGame(false);return;}
    resetBall();return;
  }
  // paddle
  if(ball.y+ball.r>=paddle.y&&ball.y+ball.r<=paddle.y+paddle.h&&
     ball.x>=paddle.x&&ball.x<=paddle.x+paddle.w){
    ball.vy=-Math.abs(ball.vy);
    const rel=(ball.x-(paddle.x+paddle.w/2))/(paddle.w/2);
    ball.vx=rel*5;
    ball.y=paddle.y-ball.r;
  }
  // bricks
  let alive=0;
  for(const b of bricks){
    if(!b.alive)continue;
    alive++;
    if(ball.x+ball.r>b.x&&ball.x-ball.r<b.x+b.w&&
       ball.y+ball.r>b.y&&ball.y-ball.r<b.y+b.h){
      b.alive=false;
      score+=10;
      document.getElementById('score').textContent=score;
      // determine bounce direction
      const overlapL=ball.x+ball.r-b.x,overlapR=b.x+b.w-ball.x+ball.r;
      const overlapT=ball.y+ball.r-b.y,overlapB=b.y+b.h-ball.y+ball.r;
      const minH=Math.min(overlapL,overlapR),minV=Math.min(overlapT,overlapB);
      if(minH<minV)ball.vx*=-1;else ball.vy*=-1;
      break;
    }
  }
  if(alive===0){level++;document.getElementById('level').textContent=level;resetBall();initLevel();}
}

function draw(){
  ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);
  // bricks
  for(const b of bricks){
    if(!b.alive)continue;
    ctx.fillStyle=b.color;
    ctx.beginPath();ctx.roundRect(b.x,b.y,b.w,b.h,4);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.25)';
    ctx.beginPath();ctx.roundRect(b.x+2,b.y+2,b.w-4,6,2);ctx.fill();
  }
  // paddle
  const pg=ctx.createLinearGradient(paddle.x,paddle.y,paddle.x,paddle.y+paddle.h);
  pg.addColorStop(0,'#8b83ff');pg.addColorStop(1,'#6c63ff');
  ctx.fillStyle=pg;
  ctx.beginPath();ctx.roundRect(paddle.x,paddle.y,paddle.w,paddle.h,6);ctx.fill();
  // ball
  const bg=ctx.createRadialGradient(ball.x-2,ball.y-2,1,ball.x,ball.y,ball.r);
  bg.addColorStop(0,'#fff');bg.addColorStop(1,'#6c63ff');
  ctx.fillStyle=bg;
  ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);ctx.fill();
}

function endGame(win){
  running=false;
  const ov=document.getElementById('overlay');
  ov.innerHTML=win?
    `<h2>🎉 You Win!</h2><p>Score: ${score}</p><button class="btn" onclick="startGame()">Play Again</button>`:
    `<h2>Game Over</h2><p>Score: ${score}</p><button class="btn" onclick="startGame()">Try Again</button>`;
  ov.style.display='flex';
}

// Mouse
canvas.addEventListener('mousemove',e=>{
  const r=canvas.getBoundingClientRect();
  const x=e.clientX-r.left-paddle.w/2;
  paddle.x=Math.max(0,Math.min(W-paddle.w,x));
});
canvas.addEventListener('click',()=>{if(!ball.launched)ball.launched=true;});

// Touch
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  const r=canvas.getBoundingClientRect();
  const x=e.touches[0].clientX-r.left-paddle.w/2;
  paddle.x=Math.max(0,Math.min(W-paddle.w,x));
  if(!ball.launched)ball.launched=true;
},{passive:false});

// Draw initial state
paddle={x:W/2-40,y:H-30,w:80,h:12};
ball={x:W/2,y:H-50,r:8,launched:false,vx:0,vy:0};
ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);
</script>
</body>
</html>
