<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>2048 — Game Portal</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f5f5f7;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding-bottom:40px}
nav{width:100%;background:#fff;border-bottom:1px solid #e5e7eb;padding:0 24px;height:50px;display:flex;align-items:center}
nav a{color:#6c63ff;text-decoration:none;font-size:14px;font-weight:500}
h1{margin:20px 0 4px;font-size:24px;font-weight:700}
.sub{color:#6b7280;font-size:14px;margin-bottom:16px}
.score-bar{display:flex;gap:16px;margin-bottom:14px}
.score-box{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:8px 20px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.06);min-width:90px}
.score-label{font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:.05em}
.score-val{font-size:20px;font-weight:700;color:#6c63ff}
.board{background:#cdc1b4;border-radius:10px;padding:8px;display:grid;grid-template-columns:repeat(4,1fr);gap:8px;width:340px;box-shadow:0 4px 12px rgba(0,0,0,.1)}
.tile{width:75px;height:75px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;transition:background .1s}
.controls{margin-top:16px;display:flex;gap:10px}
.btn{padding:9px 22px;background:#6c63ff;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
.btn:hover{background:#574fd6}
.hint{margin-top:10px;font-size:12px;color:#9ca3af}
.msg{margin-top:12px;font-size:18px;font-weight:700;min-height:28px}
</style>
</head>
<body>
<nav><a href="../../">← Back to Portal</a></nav>
<h1>🔢 2048</h1>
<p class="sub">Slide tiles to combine numbers. Reach 2048 to win!</p>

<div class="score-bar">
  <div class="score-box"><div class="score-label">Score</div><div class="score-val" id="score">0</div></div>
  <div class="score-box"><div class="score-label">Best</div><div class="score-val" id="best">0</div></div>
</div>

<div class="board" id="board"></div>
<div class="msg" id="msg"></div>

<div class="controls">
  <button class="btn" id="new-game-btn">New Game</button>
</div>
<p class="hint">Arrow keys / WASD · Swipe on mobile</p>

<script>
const COLORS={
  0:'#cdc1b4',2:'#eee4da',4:'#ede0c8',8:'#f2b179',16:'#f59563',
  32:'#f67c5f',64:'#f65e3b',128:'#edcf72',256:'#edcc61',
  512:'#edc850',1024:'#edc53f',2048:'#edc22e',
};
const TXTCOLOR={2:'#776e65',4:'#776e65'};

let grid,score,best=+localStorage.getItem('2048best')||0;
document.getElementById('best').textContent=best;

function newGame(){
  grid=Array.from({length:4},()=>Array(4).fill(0));
  score=0;
  document.getElementById('score').textContent=0;
  document.getElementById('msg').textContent='';
  addRandom();addRandom();
  render();
}

function addRandom(){
  const empty=[];
  for(let r=0;r<4;r++)for(let c=0;c<4;c++)if(grid[r][c]===0)empty.push([r,c]);
  if(!empty.length)return;
  const [r,c]=empty[Math.floor(Math.random()*empty.length)];
  grid[r][c]=Math.random()<.9?2:4;
}

function slide(row){
  let r=row.filter(x=>x);
  for(let i=0;i<r.length-1;i++){
    if(r[i]===r[i+1]){r[i]*=2;score+=r[i];r.splice(i+1,1);i++;}
  }
  while(r.length<4)r.push(0);
  return r;
}

function move(dir){
  let moved=false;
  if(dir==='left'||dir==='right'){
    for(let r=0;r<4;r++){
      const orig=grid[r].join(',');
      const row=dir==='right'?[...grid[r]].reverse():grid[r];
      const s=slide(row);
      const final=dir==='right'?s.reverse():s;
      grid[r]=final;
      if(grid[r].join(',')!==orig)moved=true;
    }
  }else{
    for(let c=0;c<4;c++){
      let col=grid.map(r=>r[c]);
      const orig=col.join(',');
      if(dir==='down')col.reverse();
      col=slide(col);
      if(dir==='down')col.reverse();
      for(let r=0;r<4;r++)grid[r][c]=col[r];
      if(col.join(',')!==orig)moved=true;
    }
  }
  if(moved)addRandom();
  document.getElementById('score').textContent=score;
  if(score>best){best=score;localStorage.setItem('2048best',best);document.getElementById('best').textContent=best;}
  render();
  checkEnd();
}

function checkEnd(){
  // Win
  for(let r=0;r<4;r++)for(let c=0;c<4;c++)if(grid[r][c]===2048){document.getElementById('msg').textContent='🎉 You reached 2048!';return;}
  // Can move?
  for(let r=0;r<4;r++)for(let c=0;c<4;c++){
    if(grid[r][c]===0)return;
    if(c<3&&grid[r][c]===grid[r][c+1])return;
    if(r<3&&grid[r][c]===grid[r+1][c])return;
  }
  document.getElementById('msg').textContent='Game Over!';
}

function render(){
  const board=document.getElementById('board');
  board.innerHTML='';
  for(let r=0;r<4;r++)for(let c=0;c<4;c++){
    const v=grid[r][c];
    const tile=document.createElement('div');
    tile.className='tile';
    tile.style.background=COLORS[Math.min(v,2048)]||'#3c3a32';
    tile.style.color=TXTCOLOR[v]||'#f9f6f2';
    tile.style.fontSize=v>=1024?'16px':v>=128?'20px':'24px';
    if(v)tile.textContent=v;
    board.appendChild(tile);
  }
}

document.addEventListener('keydown',e=>{
  const map={ArrowLeft:'left',ArrowRight:'right',ArrowUp:'up',ArrowDown:'down',
    a:'left',d:'right',w:'up',s:'down',A:'left',D:'right',W:'up',S:'down'};
  if(map[e.key]){move(map[e.key]);e.preventDefault();}
});

// Touch
let tx=0,ty=0;
document.getElementById('board').addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
document.getElementById('board').addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx;
  const dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)>Math.abs(dy)){move(dx>20?'right':'left');}
  else{move(dy>20?'down':'up');}
},{passive:true});

document.getElementById('new-game-btn').addEventListener('click', newGame);
newGame();
</script>
</body>
</html>
