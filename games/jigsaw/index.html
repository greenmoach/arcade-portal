<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Jigsaw Puzzle — Game Portal</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f5f5f7;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding-bottom:40px}
nav{width:100%;background:#fff;border-bottom:1px solid #e5e7eb;padding:0 24px;height:50px;display:flex;align-items:center}
nav a{color:#6c63ff;text-decoration:none;font-size:14px;font-weight:500}
h1{margin:20px 0 4px;font-size:24px;font-weight:700}
.sub{color:#6b7280;font-size:14px;margin-bottom:14px}
.score-bar{display:flex;gap:16px;margin-bottom:14px}
.score-box{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:8px 20px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.06);min-width:100px}
.score-label{font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:.05em}
.score-val{font-size:20px;font-weight:700;color:#6c63ff}
.layout{display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap;justify-content:center}
canvas{border-radius:14px;border:1px solid #e5e7eb;box-shadow:0 4px 12px rgba(0,0,0,.08);display:block;touch-action:none}
.controls{margin-top:16px;display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.btn{padding:9px 22px;background:#6c63ff;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
.btn:hover{background:#574fd6}
select{padding:8px 12px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:14px;background:#fff}
.msg{margin-top:10px;font-size:16px;font-weight:600;color:#6c63ff;min-height:24px}
.hint{margin-top:8px;font-size:12px;color:#9ca3af}
</style>
</head>
<body>
<nav><a href="../../">← Back to Portal</a></nav>
<h1>🧩 Jigsaw Puzzle</h1>
<p class="sub">Drag and snap pieces to complete the picture!</p>

<div class="score-bar">
  <div class="score-box"><div class="score-label">Placed</div><div class="score-val" id="placed">0</div></div>
  <div class="score-box"><div class="score-label">Total</div><div class="score-val" id="total">-</div></div>
  <div class="score-box"><div class="score-label">Time</div><div class="score-val" id="timer">0:00</div></div>
</div>

<div class="layout">
  <div>
    <p style="font-size:12px;color:#6b7280;text-align:center;margin-bottom:6px">Reference</p>
    <canvas id="ref" width="200" height="200"></canvas>
  </div>
  <div>
    <p style="font-size:12px;color:#6b7280;text-align:center;margin-bottom:6px">Puzzle Board</p>
    <canvas id="board" width="400" height="400"></canvas>
  </div>
</div>

<div class="msg" id="msg"></div>

<div class="controls">
  <select id="grid-size" onchange="newGame()">
    <option value="3">3×3 (9 pieces)</option>
    <option value="4" selected>4×4 (16 pieces)</option>
    <option value="5">5×5 (25 pieces)</option>
  </select>
  <button class="btn" onclick="newGame()">New Puzzle</button>
</div>
<p class="hint">Drag pieces from the scatter zone into the correct position</p>

<script>
const refCv=document.getElementById('ref');
const refCtx=refCv.getContext('2d');
const boardCv=document.getElementById('board');
const bctx=boardCv.getContext('2d');

const BW=400,BH=400;

// Generate a colorful procedural image
const PALETTES=[
  ['#ef4444','#f97316','#f59e0b','#84cc16','#22d3ee','#6c63ff','#ec4899','#14b8a6'],
  ['#1e40af','#7c3aed','#db2777','#dc2626','#b45309'],
  ['#065f46','#1e3a5f','#4c1d95','#7f1d1d'],
];

let N,CELL,pieces,dragging,dragOffX,dragOffY,timer,seconds,timerInterval;

function drawImage(ctx,size){
  const pal=PALETTES[Math.floor(Math.random()*PALETTES.length)];
  // Background
  ctx.fillStyle=pal[0];ctx.fillRect(0,0,size,size);
  // Draw random shapes
  for(let i=0;i<20;i++){
    ctx.fillStyle=pal[Math.floor(Math.random()*pal.length)]+(Math.floor(Math.random()*60+80).toString(16));
    ctx.beginPath();
    const type=Math.floor(Math.random()*3);
    const x=Math.random()*size,y=Math.random()*size,r=Math.random()*size*.3+size*.05;
    if(type===0){ctx.arc(x,y,r,0,Math.PI*2);}
    else if(type===1){ctx.rect(x-r,y-r,r*2,r*2);}
    else{ctx.moveTo(x,y-r);ctx.lineTo(x+r,y+r*.6);ctx.lineTo(x-r,y+r*.6);}
    ctx.fill();
  }
  // Grid pattern for visual interest
  for(let i=0;i<6;i++){
    const x=Math.random()*size,y=Math.random()*size;
    ctx.strokeStyle='rgba(255,255,255,.15)';ctx.lineWidth=size*.02;
    ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(size,y);ctx.stroke();
    ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,size);ctx.stroke();
  }
}

// Offscreen canvas for the image
let imgCv;

function newGame(){
  clearInterval(timerInterval);
  N=+document.getElementById('grid-size').value;
  CELL=BW/N;
  document.getElementById('placed').textContent=0;
  document.getElementById('total').textContent=N*N;
  document.getElementById('msg').textContent='';
  seconds=0;document.getElementById('timer').textContent='0:00';
  timerInterval=setInterval(()=>{seconds++;const m=Math.floor(seconds/60),s=seconds%60;document.getElementById('timer').textContent=`${m}:${s.toString().padStart(2,'0')}`;},1000);

  // Draw image on offscreen canvas
  imgCv=document.createElement('canvas');
  imgCv.width=BW;imgCv.height=BH;
  drawImage(imgCv.getContext('2d'),BW);

  // Draw reference (scaled)
  refCtx.clearRect(0,0,200,200);
  refCtx.drawImage(imgCv,0,0,200,200);

  // Create pieces
  pieces=[];
  const scatter=[];
  for(let r=0;r<N;r++)for(let c=0;c<N;c++){
    scatter.push({
      r,c,
      x:Math.random()*(BW-CELL),y:Math.random()*(BH-CELL),
      placed:false
    });
  }
  // Shuffle scatter positions
  for(let i=scatter.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[scatter[i],scatter[j]]=[scatter[j],scatter[i]];}
  pieces=scatter;
  dragging=null;
  draw();
}

function draw(){
  bctx.fillStyle='#f9fafb';bctx.fillRect(0,0,BW,BH);
  // Draw grid slots
  for(let r=0;r<N;r++)for(let c=0;c<N;c++){
    bctx.strokeStyle='#e5e7eb';bctx.lineWidth=1;
    bctx.strokeRect(c*CELL,r*CELL,CELL,CELL);
    // Show faint image in slot
    bctx.globalAlpha=0.12;
    bctx.drawImage(imgCv,c*CELL,r*CELL,CELL,CELL,c*CELL,r*CELL,CELL,CELL);
    bctx.globalAlpha=1;
  }
  // Draw placed pieces
  pieces.filter(p=>p.placed).forEach(p=>{
    bctx.drawImage(imgCv,p.c*CELL,p.r*CELL,CELL,CELL,p.c*CELL,p.r*CELL,CELL,CELL);
    bctx.strokeStyle='rgba(108,99,255,.3)';bctx.lineWidth=1;
    bctx.strokeRect(p.c*CELL,p.r*CELL,CELL,CELL);
  });
  // Draw loose pieces
  pieces.filter(p=>!p.placed&&p!==dragging).forEach(p=>drawPiece(p));
  if(dragging)drawPiece(dragging);
}

function drawPiece(p){
  bctx.save();
  bctx.shadowColor='rgba(0,0,0,.25)';bctx.shadowBlur=8;bctx.shadowOffsetY=3;
  bctx.beginPath();bctx.roundRect(p.x,p.y,CELL-2,CELL-2,4);bctx.clip();
  bctx.drawImage(imgCv,p.c*CELL,p.r*CELL,CELL,CELL,p.x,p.y,CELL-2,CELL-2);
  bctx.restore();
  bctx.strokeStyle='rgba(255,255,255,.8)';bctx.lineWidth=1.5;
  bctx.beginPath();bctx.roundRect(p.x,p.y,CELL-2,CELL-2,4);bctx.stroke();
}

function getPieceAt(x,y){
  for(let i=pieces.length-1;i>=0;i--){
    const p=pieces[i];
    if(!p.placed&&x>=p.x&&x<=p.x+CELL&&y>=p.y&&y<=p.y+CELL)return p;
  }
  return null;
}

function snapCheck(p){
  const targetX=p.c*CELL,targetY=p.r*CELL;
  if(Math.abs(p.x-targetX)<CELL*.35&&Math.abs(p.y-targetY)<CELL*.35){
    p.x=targetX;p.y=targetY;p.placed=true;
    document.getElementById('placed').textContent=pieces.filter(p=>p.placed).length;
    if(pieces.every(p=>p.placed)){
      clearInterval(timerInterval);
      const m=Math.floor(seconds/60),s=seconds%60;
      document.getElementById('msg').textContent=`🎉 Solved in ${m}:${s.toString().padStart(2,'0')}!`;
    }
  }
}

boardCv.addEventListener('mousedown',e=>{
  const r=boardCv.getBoundingClientRect();
  const x=e.clientX-r.left,y=e.clientY-r.top;
  const p=getPieceAt(x,y);
  if(p){dragging=p;dragOffX=x-p.x;dragOffY=y-p.y;
    pieces.splice(pieces.indexOf(p),1);pieces.push(p);}
});
document.addEventListener('mousemove',e=>{
  if(!dragging)return;
  const r=boardCv.getBoundingClientRect();
  dragging.x=e.clientX-r.left-dragOffX;
  dragging.y=e.clientY-r.top-dragOffY;
  draw();
});
document.addEventListener('mouseup',()=>{if(dragging){snapCheck(dragging);dragging=null;draw();}});

boardCv.addEventListener('touchstart',e=>{
  const r=boardCv.getBoundingClientRect();
  const t=e.touches[0];
  const x=t.clientX-r.left,y=t.clientY-r.top;
  const p=getPieceAt(x,y);
  if(p){dragging=p;dragOffX=x-p.x;dragOffY=y-p.y;
    pieces.splice(pieces.indexOf(p),1);pieces.push(p);}
},{passive:true});
document.addEventListener('touchmove',e=>{
  if(!dragging)return;
  e.preventDefault();
  const r=boardCv.getBoundingClientRect();
  const t=e.touches[0];
  dragging.x=t.clientX-r.left-dragOffX;
  dragging.y=t.clientY-r.top-dragOffY;
  draw();
},{passive:false});
document.addEventListener('touchend',()=>{if(dragging){snapCheck(dragging);dragging=null;draw();}});

newGame();
</script>
</body>
</html>
