<body>
<nav><a href="../../">← Back to Portal</a></nav>
<h1>🟢 Simon Says</h1>
<p class="sub">Watch the sequence, then repeat it from memory. Each round adds one more color.</p>

<div class="score-bar">
  <div class="score-box"><div class="score-label">Round</div><div class="score-val" id="round">0</div></div>
  <div class="score-box"><div class="score-label">Best</div><div class="score-val" id="best">0</div></div>
  <div class="score-box"><div class="score-label">Input</div><div class="score-val" id="input">0</div></div>
</div>

<div class="game">
  <div class="pads" id="pads"></div>
  <div class="status" id="status">Press Start to begin.</div>
  <div class="overlay" id="overlay">
    <h2>🧠 Simon Says</h2>
    <p>Tap the pads or use keys 1–4 after the sequence finishes playing.</p>
    <button class="btn" id="overlay-btn">Start Game</button>
  </div>
</div>
<p class="hint">Keys 1 / 2 / 3 / 4 also work · Taps work on mobile</p>

<script>
const BEST_KEY='simonBestRound';
const padsEl=document.getElementById('pads');
const overlay=document.getElementById('overlay');
const statusEl=document.getElementById('status');
const colors=['Green','Red','Yellow','Blue'];
let sequence=[],inputIndex=0,accepting=false,best=+(localStorage.getItem(BEST_KEY)||0);
document.getElementById('best').textContent=best;

function buildPads(){
  padsEl.innerHTML='';
  colors.forEach((name,index)=>{
    const btn=document.createElement('button');
    btn.className=`pad pad-${index}`;
    btn.textContent=name;
    btn.addEventListener('click',()=>pressPad(index));
    padsEl.appendChild(btn);
  });
}

function startGame(){
  sequence=[];
  document.getElementById('round').textContent='0';
  document.getElementById('input').textContent='0';
  overlay.style.display='none';
  statusEl.textContent='Watch carefully...';
  nextRound();
}

function nextRound(){
  accepting=false;
  inputIndex=0;
  sequence.push(Math.floor(Math.random()*4));
  document.getElementById('round').textContent=sequence.length;
  document.getElementById('input').textContent='0';
  statusEl.textContent='Watch the sequence...';
  playSequence(0);
}

function playSequence(step){
  if(step>=sequence.length){
    accepting=true;
    statusEl.textContent='Your turn!';
    return;
  }
  flashPad(sequence[step]);
  setTimeout(()=>playSequence(step+1),700);
}

function flashPad(index){
  const pad=padsEl.children[index];
  if(!pad)return;
  pad.classList.add('active');
  setTimeout(()=>pad.classList.remove('active'),320);
}

function pressPad(index){
  if(!accepting)return;
  flashPad(index);
  if(index!==sequence[inputIndex]){
    accepting=false;
    finishGame();
    return;
  }
  inputIndex++;
  document.getElementById('input').textContent=inputIndex;
  if(inputIndex===sequence.length){
    accepting=false;
    if(sequence.length>best){best=sequence.length;localStorage.setItem(BEST_KEY,String(best));document.getElementById('best').textContent=best;}
    statusEl.textContent='Nice! Next round...';
    setTimeout(nextRound,700);
  }
}

function finishGame(){
  const round=Math.max(0,sequence.length-1);
  statusEl.textContent=`Game over at round ${round}.`;
  overlay.innerHTML=`<h2>❌ Sequence broken</h2><p>You reached round <strong>${round}</strong>. Ready to try again?</p><button class="btn" id="overlay-btn">Play Again</button>`;
  overlay.style.display='flex';
  document.getElementById('overlay-btn').addEventListener('click',startGame);
}

document.addEventListener('keydown',e=>{
  if(overlay.style.display!=='none'&&(e.key==='Enter'||e.key===' ')){e.preventDefault();document.getElementById('overlay-btn').click();return;}
  const map={'1':0,'2':1,'3':2,'4':3};
  if(map[e.key]!==undefined){e.preventDefault();pressPad(map[e.key]);}
});

document.getElementById('overlay-btn').addEventListener('click',startGame);
buildPads();
</script>
</body>
