<body>
<nav><a href="../../">← Back to Portal</a></nav>
<h1>🀄 Memory Match</h1>
<p class="sub">Flip cards to find matching pairs. Remember what you've seen!</p>

<div class="score-bar">
  <div class="score-box"><div class="score-label">Pairs</div><div class="score-val" id="pairs">0</div></div>
  <div class="score-box"><div class="score-label">Moves</div><div class="score-val" id="moves">0</div></div>
  <div class="score-box"><div class="score-label">Best</div><div class="score-val" id="best">—</div></div>
</div>

<div class="grid" id="grid"></div>
<div class="msg" id="msg"></div>

<div class="controls">
  <select id="size">
    <option value="4">4×4 (8 pairs)</option>
    <option value="5">5×4 (10 pairs)</option>
    <option value="6">6×4 (12 pairs)</option>
  </select>
  <button class="btn" id="new-game-btn">New Game</button>
</div>

<script>
const EMOJIS='🐶🐱🐭🐹🐰🦊🐻🐼🐨🐯🦁🐮🐷🐸🐵🐔🐧🐦🦆🦅🦉🦋🐛🐌🐝🌸🌺🌻🌹🍎🍊🍋🍇🍓🎃🎄🎈🎯🏆🚀'.split('');

let flipped=[],matched=0,moves,total,lock,bestMoves;

function newGame(){
  const cols=6,rows=+document.getElementById('size').value;
  const n=Math.floor(cols*rows/2);
  total=n;matched=0;moves=0;lock=false;
  document.getElementById('pairs').textContent=0;
  document.getElementById('moves').textContent=0;
  document.getElementById('msg').textContent='';

  const ems=EMOJIS.slice(0,n);
  let cards=[...ems,...ems];
  for(let i=cards.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[cards[i],cards[j]]=[cards[j],cards[i]];}

  const grid=document.getElementById('grid');
  grid.style.gridTemplateColumns=`repeat(${cols},70px)`;
  grid.innerHTML='';
  cards.forEach((em,i)=>{
    const card=document.createElement('div');
    card.className='card';
    card.dataset.emoji=em;
    card.innerHTML=`<div class="card-front">?</div><div class="card-back">${em}</div>`;
    card.addEventListener('click',()=>flipCard(card));
    grid.appendChild(card);
  });
}

function flipCard(card){
  if(lock||card.classList.contains('flipped')||card.classList.contains('matched'))return;
  card.classList.add('flipped');
  flipped.push(card);
  if(flipped.length===2){
    moves++;document.getElementById('moves').textContent=moves;
    lock=true;
    setTimeout(()=>{
      if(flipped[0].dataset.emoji===flipped[1].dataset.emoji){
        flipped.forEach(c=>c.classList.add('matched'));
        matched++;
        document.getElementById('pairs').textContent=matched;
        if(matched===total){
          const b=+localStorage.getItem('memBest')||Infinity;
          if(moves<b){localStorage.setItem('memBest',moves);}
          const best=localStorage.getItem('memBest');
          document.getElementById('best').textContent=best;
          document.getElementById('msg').textContent=`🎉 Done in ${moves} moves!`;
        }
      }else{
        flipped.forEach(c=>c.classList.remove('flipped'));
      }
      flipped=[];lock=false;
    },900);
  }
}

const best=localStorage.getItem('memBest');
if(best)document.getElementById('best').textContent=best;
document.getElementById('size').addEventListener('change',newGame);
document.getElementById('new-game-btn').addEventListener('click',newGame);
newGame();
</script>
