<body>
<nav><a href="../../">← Back to Portal</a></nav>
<h1>🏓 Pong</h1>
<p class="sub">Classic table tennis. First to 7 wins!</p>

<div class="canvas-wrap">
  <canvas id="c" width="480" height="360"></canvas>
  <div class="overlay" id="overlay">
    <h2>🏓 Pong</h2>
    <p>Choose your mode</p>
    <div class="mode-row">
      <button class="btn" id="btn-ai">vs AI</button>
      <button class="btn" id="btn-2p">2 Players</button>
    </div>
    <p>Player 1: W/S &nbsp;·&nbsp; Player 2: ↑/↓<br>vs AI: move mouse or W/S</p>
  </div>
</div>
<p class="hint">First to 7 points wins</p>

<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const W=480,H=360,PW=10,PH=70,BALL_R=8,WIN=7;

let p1,p2,ball,scores,running,animId,twoPlayer;
const keys={};

function startGame(two){
  twoPlayer=two;
  p1={x:16,y:H/2-PH/2,score:0};
  p2={x:W-16-PW,y:H/2-PH/2,score:0};
  scores=[0,0];
  resetBall(1);
  document.getElementById('overlay').style.display='none';
  running=true;
  cancelAnimationFrame(animId);
  loop();
}

function resetBall(dir){
  ball={x:W/2,y:H/2,vx:4*dir,vy:(Math.random()*4-2),r:BALL_R};
}

function loop(){update();draw();if(running)animId=requestAnimationFrame(loop);}

function update(){
  // P1
  if(keys['w']||keys['W'])p1.y-=5;
  if(keys['s']||keys['S'])p1.y+=5;
  p1.y=Math.max(0,Math.min(H-PH,p1.y));

  // P2
  if(twoPlayer){
    if(keys['ArrowUp'])p2.y-=5;
    if(keys['ArrowDown'])p2.y+=5;
    p2.y=Math.max(0,Math.min(H-PH,p2.y));
  }else{
    // Simple AI
    const center=p2.y+PH/2;
    const speed=3.5;
    if(center<ball.y-4)p2.y+=speed;
    else if(center>ball.y+4)p2.y-=speed;
    p2.y=Math.max(0,Math.min(H-PH,p2.y));
  }

  ball.x+=ball.vx;ball.y+=ball.vy;

  // Top/bottom bounce
  if(ball.y-ball.r<0){ball.y=ball.r;ball.vy*=-1;}
  if(ball.y+ball.r>H){ball.y=H-ball.r;ball.vy*=-1;}

  // P1 paddle
  if(ball.x-ball.r<=p1.x+PW&&ball.x-ball.r>=p1.x&&ball.y>=p1.y&&ball.y<=p1.y+PH){
    ball.vx=Math.abs(ball.vx)*1.05;
    ball.vy=((ball.y-(p1.y+PH/2))/(PH/2))*5;
    ball.x=p1.x+PW+ball.r;
    if(Math.abs(ball.vx)>12)ball.vx=12;
  }

  // P2 paddle
  if(ball.x+ball.r>=p2.x&&ball.x+ball.r<=p2.x+PW&&ball.y>=p2.y&&ball.y<=p2.y+PH){
    ball.vx=-Math.abs(ball.vx)*1.05;
    ball.vy=((ball.y-(p2.y+PH/2))/(PH/2))*5;
    ball.x=p2.x-ball.r;
    if(Math.abs(ball.vx)>12)ball.vx=-12;
  }

  // Score
  if(ball.x+ball.r<0){scores[1]++;p2.score=scores[1];checkWin(2)||resetBall(1);}
  if(ball.x-ball.r>W){scores[0]++;p1.score=scores[0];checkWin(1)||resetBall(-1);}
}

function checkWin(p){
  if(scores[p-1]>=WIN){
    running=false;
    const ov=document.getElementById('overlay');
    ov.innerHTML=`<h2>${p===1?'Player 1':'Player 2'} Wins! 🎉</h2>
      <p>${scores[0]} – ${scores[1]}</p>
      <div class="mode-row">
        <button class="btn" onclick="startGame(false)">vs AI</button>
        <button class="btn" onclick="startGame(true)">2 Players</button>
      </div>`;
    ov.style.display='flex';
    return true;
  }
  return false;
}

function draw(){
  ctx.fillStyle='#1a1a2e';ctx.fillRect(0,0,W,H);
  // Center line
  ctx.strokeStyle='rgba(255,255,255,.15)';ctx.setLineDash([8,8]);
  ctx.beginPath();ctx.moveTo(W/2,0);ctx.lineTo(W/2,H);ctx.stroke();
  ctx.setLineDash([]);
  // Scores
  ctx.fillStyle='rgba(255,255,255,.6)';ctx.font='bold 36px system-ui';
  ctx.textAlign='center';
  ctx.fillText(scores[0],W/2-70,48);
  ctx.fillText(scores[1],W/2+70,48);
  // Paddles
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.roundRect(p1.x,p1.y,PW,PH,4);ctx.fill();
  ctx.beginPath();ctx.roundRect(p2.x,p2.y,PW,PH,4);ctx.fill();
  // Ball
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);ctx.fill();
  // Trail
  ctx.fillStyle='rgba(108,99,255,.4)';
  ctx.beginPath();ctx.arc(ball.x-ball.vx*1.5,ball.y-ball.vy*1.5,ball.r*.6,0,Math.PI*2);ctx.fill();
}

document.getElementById('btn-ai').addEventListener('click',()=>startGame(false));
document.getElementById('btn-2p').addEventListener('click',()=>startGame(true));
document.addEventListener('keydown',e=>{keys[e.key]=true;if(['ArrowUp','ArrowDown'].includes(e.key))e.preventDefault();});
document.addEventListener('keyup',e=>{keys[e.key]=false;});

// Mouse for AI mode
canvas.addEventListener('mousemove',e=>{
  if(!running||twoPlayer)return;
  const r=canvas.getBoundingClientRect();
  p1.y=(e.clientY-r.top)-PH/2;
  p1.y=Math.max(0,Math.min(H-PH,p1.y));
});

// Touch
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(!running)return;
  const r=canvas.getBoundingClientRect();
  const x=e.touches[0].clientX-r.left;
  const y=e.touches[0].clientY-r.top;
  if(x<W/2)p1.y=y-PH/2;
  else p2.y=y-PH/2;
  p1.y=Math.max(0,Math.min(H-PH,p1.y));
  p2.y=Math.max(0,Math.min(H-PH,p2.y));
},{passive:false});
</script>
